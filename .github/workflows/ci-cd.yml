name: CI/CD Pipeline - Sonar, Docker, and Terraform

on:
  push:
    branches: [ GitHubActions ]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform Action (apply or destroy)"
        default: "apply"
        required: true

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated to v6 for Node 24
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated to v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4 # Updated to v4 for Node 24
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6 # Updated to v6 for Node 24
        with:
          context: .
          push: true
          tags: |
            darkknight111/onix-website:latest
            darkknight111/onix-website:${{ github.run_number }}

  terraform:
    name: Terraform Execution
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Updated to v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Action
        run: |
          ACTION="${{ github.event.inputs.action || 'apply' }}"
          terraform $ACTION -auto-approve \
          -var="container_image=darkknight111/onix-website:${{ github.run_number }}"
        working-directory: ./terraform
